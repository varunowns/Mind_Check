<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const storedTheme = localStorage.getItem("mindcheck-theme") ?? localStorage.getItem("mindcheck.theme");
        const nextTheme = storedTheme === "dark" || storedTheme === "light"
          ? storedTheme
          : window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        document.documentElement.dataset.theme = nextTheme;
        document.documentElement.style.colorScheme = nextTheme;
      })();
    </script>
    <title>MindCheck</title>
    <script type="module" crossorigin src="/assets/index-DM1CC18T.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DZP3noOV.css">
  </head>

    <div id="root"></div>
  </body>
</html>
